name: Deploy Multiple GitHub Actions Runners on Proxmox

on:
  workflow_dispatch:
    inputs:
      runner_prefix:
        description: "Runner name prefix (e.g. runner-proxmox-scrumfight)"
        required: true
        type: string
      runner_start:
        description: "First runner number (inclusive)"
        required: true
        type: string
        default: "1"
      runner_end:
        description: "Last runner number (inclusive)"
        required: true
        type: string
        default: "3"
      runner_repo:
        description: "Repository or org URL (e.g. https://github.com/org/repo)"
        required: true
        type: string
      container_password:
        description: "Root password for Proxmox console access (auto-generated per container if blank)"
        required: false
        type: string

jobs:
  deploy:
    name: Deploy ${{ inputs.runner_prefix }}-${{ inputs.runner_start }} … ${{ inputs.runner_prefix }}-${{ inputs.runner_end }}
    runs-on: [self-hosted, proxmox]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate inputs
        run: |
          START="${{ inputs.runner_start }}"
          END="${{ inputs.runner_end }}"
          [[ "$START" =~ ^[0-9]+$ ]] || { echo "ERROR: runner_start is not a number." >&2; exit 1; }
          [[ "$END"   =~ ^[0-9]+$ ]] || { echo "ERROR: runner_end is not a number."   >&2; exit 1; }
          [[ "$START" -le "$END"  ]] || { echo "ERROR: runner_start must be ≤ runner_end." >&2; exit 1; }

      # Requires a secret named GH_PAT with one of:
      #   - Fine-grained PAT: "Administration: Read & write" on the target repo
      #     (or "Self-hosted runners: Read & write" for org-level runners)
      #   - Classic PAT: "repo" scope (repo runners) or "admin:org" scope (org runners)
      - name: Generate runner registration token
        id: get-token
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          PATH_PART="${{ inputs.runner_repo }}"
          PATH_PART="${PATH_PART#https://github.com/}"
          PATH_PART="${PATH_PART%/}"

          if [[ -z "$PATH_PART" ]]; then
            echo "ERROR: runner_repo input is invalid or empty." >&2
            exit 1
          fi

          SEGMENT_COUNT=$(awk -F'/' '{print NF}' <<< "$PATH_PART")

          if [[ "$SEGMENT_COUNT" -ge 2 ]]; then
            API_URL="https://api.github.com/repos/${PATH_PART}/actions/runners/registration-token"
          else
            API_URL="https://api.github.com/orgs/${PATH_PART}/actions/runners/registration-token"
          fi

          RESPONSE=$(curl -fsSL -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_PAT}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "${API_URL}")

          TOKEN=$(echo "$RESPONSE" | grep '"token"' | head -1 | cut -d'"' -f4)

          if [[ -z "$TOKEN" ]]; then
            echo "ERROR: failed to obtain registration token." >&2
            echo "API response: $RESPONSE" >&2
            exit 1
          fi

          echo "::add-mask::${TOKEN}"
          echo "runner_token=${TOKEN}" >> "$GITHUB_OUTPUT"

      - name: Deploy runners
        env:
          RUNNER_REPO: ${{ inputs.runner_repo }}
          RUNNER_TOKEN: ${{ steps.get-token.outputs.runner_token }}
          CONTAINER_PASSWORD: ${{ inputs.container_password }}
        run: |
          for i in $(seq "${{ inputs.runner_start }}" "${{ inputs.runner_end }}"); do
            RUNNER_NAME="${{ inputs.runner_prefix }}-${i}"
            CTID=$(pvesh get /cluster/nextid)
            if echo "$CTID" | grep -q '{'; then
              CTID=$(echo "$CTID" | grep -o '[0-9]*' | head -1)
            fi
            if [[ -z "$CTID" ]] || ! [[ "$CTID" =~ ^[0-9]+$ ]]; then
              echo "ERROR: unexpected pvesh output — got: '${CTID}'" >&2
              exit 1
            fi
            echo "==> Deploying ${RUNNER_NAME} in container ${CTID}..."
            RUNNER_REPO="$RUNNER_REPO" RUNNER_TOKEN="$RUNNER_TOKEN" CTID="$CTID" CONTAINER_PASSWORD="$CONTAINER_PASSWORD" \
              bash scripts/deploy-runner.sh "${RUNNER_NAME}"
          done

      - name: Deployment summary
        run: |
          echo "Deployed runners ${{ inputs.runner_prefix }}-${{ inputs.runner_start }} through ${{ inputs.runner_prefix }}-${{ inputs.runner_end }}"
          echo "Verify: Settings → Actions → Runners in ${{ inputs.runner_repo }}"

      - name: Show recent logs on failure
        if: failure()
        run: |
          for ctid in $(pct list | awk 'NR>1 {print $1}' | tail -10); do
            echo "--- Container ${ctid} ---"
            pct exec "${ctid}" -- journalctl -u actions-runner -n 20 --no-pager 2>/dev/null || true
          done

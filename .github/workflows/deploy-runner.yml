name: Deploy GitHub Actions Runner on Proxmox

on:
  workflow_dispatch:
    inputs:
      runner_name:
        description: "Runner name (optional — generates a UUID when left blank)"
        required: false
        type: string
      runner_repo:
        description: "Repository or org URL (e.g. https://github.com/org/repo)"
        required: true
        type: string

jobs:
  deploy:
    name: Deploy runner "${{ inputs.runner_name || '(auto-named)' }}"
    # Runs on the bootstrap runner installed directly on the Proxmox host.
    # Change the label below if your runner uses a different label.
    runs-on: [self-hosted, proxmox]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve runner name
        id: resolve-name
        run: |
          NAME="${{ inputs.runner_name }}"
          if [[ -z "$NAME" ]]; then
            NAME="runner-$(uuidgen | tr '[:upper:]' '[:lower:]')"
            echo "No name provided — generated: ${NAME}"
          fi
          echo "name=${NAME}" >> "$GITHUB_OUTPUT"

      - name: Reserve next LXC container ID
        id: reserve-ctid
        run: |
          CTID=$(pvesh get /cluster/nextid)
          # Some Proxmox versions return JSON; extract the number if needed
          if echo "$CTID" | grep -q '{'; then
            CTID=$(echo "$CTID" | jq -r '.')
          fi
          if [[ -z "$CTID" ]] || ! [[ "$CTID" =~ ^[0-9]+$ ]]; then
            echo "ERROR: unexpected pvesh output — expected integer, got: '${CTID}'" >&2
            exit 1
          fi
          echo "ctid=${CTID}" >> "$GITHUB_OUTPUT"

      # Requires a secret named GH_PAT with one of:
      #   - Fine-grained PAT: "Administration: Read & write" on the target repo
      #     (or "Self-hosted runners: Read & write" for org-level runners)
      #   - Classic PAT: "repo" scope (repo runners) or "admin:org" scope (org runners)
      - name: Generate runner registration token
        id: get-token
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          PATH_PART="${{ inputs.runner_repo }}"
          PATH_PART="${PATH_PART#https://github.com/}"
          PATH_PART="${PATH_PART%/}"

          if [[ -z "$PATH_PART" ]]; then
            echo "ERROR: runner_repo input is invalid or empty." >&2
            exit 1
          fi

          SEGMENT_COUNT=$(awk -F'/' '{print NF}' <<< "$PATH_PART")

          if [[ "$SEGMENT_COUNT" -ge 2 ]]; then
            API_URL="https://api.github.com/repos/${PATH_PART}/actions/runners/registration-token"
          else
            API_URL="https://api.github.com/orgs/${PATH_PART}/actions/runners/registration-token"
          fi

          RESPONSE=$(curl -fsSL -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_PAT}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "${API_URL}")

          TOKEN=$(echo "$RESPONSE" | jq -r '.token // empty')

          if [[ -z "$TOKEN" ]]; then
            echo "ERROR: failed to obtain registration token." >&2
            echo "API response: $RESPONSE" >&2
            exit 1
          fi

          echo "::add-mask::${TOKEN}"
          echo "runner_token=${TOKEN}" >> "$GITHUB_OUTPUT"

      - name: Deploy runner in new LXC container
        env:
          RUNNER_REPO: ${{ inputs.runner_repo }}
          RUNNER_TOKEN: ${{ steps.get-token.outputs.runner_token }}
          CTID: ${{ steps.reserve-ctid.outputs.ctid }}
        run: RUNNER_REPO="$RUNNER_REPO" RUNNER_TOKEN="$RUNNER_TOKEN" CTID="$CTID" bash scripts/deploy-runner.sh "${{ steps.resolve-name.outputs.name }}"

      - name: Verify runner service is active
        run: pct exec "${{ steps.reserve-ctid.outputs.ctid }}" -- systemctl is-active actions-runner

      - name: Deployment summary
        run: |
          echo "Runner   : ${{ steps.resolve-name.outputs.name }}"
          echo "Container: ${{ steps.reserve-ctid.outputs.ctid }}"
          echo "Verify   : Settings → Actions → Runners"

      - name: Show container logs on failure
        if: failure()
        run: |
          pct exec "${{ steps.reserve-ctid.outputs.ctid }}" -- \
            journalctl -u actions-runner -n 50 --no-pager 2>/dev/null || true
